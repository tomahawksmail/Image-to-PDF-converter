<!DOCTYPE html>
<html>
<head>
    <title>Image → PDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>

<div class="hero">
    <h1>USKO PDF Converter v1.1.0</h1>
    <p>Upload images and convert instantly</p>
</div>

<div class="container">
    <form id="uploadForm">

        <label class="upload-box" id="dropZone">
            <input type="file" id="fileInput" multiple accept=".png,.jpg,.jpeg,.gif">
            <span>Click or drop images here</span>
        </label>

        <div class="options">

            <div class="option">
                <span>Fix rotation (EXIF, iPhone photos no longer rotated sideways)</span>
                <label class="switch">
                    <input type="checkbox" name="exif" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span>Fit to A4</span>
                <label class="switch">
                    <input type="checkbox" name="fit_a4" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span>Compress PDF</span>
                <label class="switch">
                    <input type="checkbox" name="compress" checked>
                    <span class="slider"></span>
                </label>
            </div>

        </div>

        <button type="submit">Convert to PDF</button>

    </form>

    <div class="progress-wrapper" id="progressWrapper">
        <div id="progressText">0%</div>
    </div>
</div>

<div class="hero">
    <p>coded by USKO IT Team, 2026</p>
</div>

<div class="formats">
    <img src="{{ url_for('static', filename='MIT.svg') }}" alt="SVG">
    <img src="{{ url_for('static', filename='USKO.jpg') }}" alt="JPG">
</div>

<script>
    const input = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const form = document.getElementById("uploadForm");
    const wrapper = document.getElementById("progressWrapper");
    const text = document.getElementById("progressText");

    function upload(files) {
        if (!files.length) return;

        const formData = new FormData();

        for (let file of files) {
            formData.append("images", file);
        }

        form.querySelectorAll("input[type=checkbox]").forEach(cb => {
            formData.append(cb.name, cb.checked ? "on" : "off");
        });

        wrapper.style.display = "flex";

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);
        xhr.responseType = "blob";

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                let p = Math.round((e.loaded / e.total) * 100);
                text.innerText = p + "%";
            }
        };

        xhr.onload = function () {
            if (xhr.status === 200) {
                text.innerText = "100%";

                const blob = new Blob([xhr.response], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = "images.pdf";
                a.click();

                URL.revokeObjectURL(url);
            }
        };

        xhr.send(formData);
    }

    form.addEventListener("submit", function(e){
        e.preventDefault();
        upload(input.files);
    });

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        upload(e.dataTransfer.files);
    });
</script>

</body>
</html>
