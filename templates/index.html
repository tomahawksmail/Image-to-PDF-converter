<!DOCTYPE html>
<html>
<head>
    <title>USKO pdf converter</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<div class="page">

    <div class="hero">
        <h1>USKO PDF Converter ver. 3.0.0</h1>
    </div>

    <div class="center-area">
        <div class="container">

            <div class="content">

                <label class="upload-box">
                    <input type="file" id="fileInput" multiple accept=".png,.jpg,.jpeg,.pdf">
                    <span>Click or drop files here</span>
                </label>

                <div id="previewList" class="preview-grid"></div>

                <div class="options">

                    <span class="option-label">Fit to A4</span>

                    <label class="switch">
                        <input type="checkbox" name="fit_a4" checked>
                        <span class="slider"></span>
                    </label>

                </div>

                <div class="options">

                    <span class="option-label">Compress PDF</span>

                    <label class="switch">
                        <input type="checkbox" name="compress">
                        <span class="slider"></span>
                    </label>

                </div>

            </div>

            <button id="convertBtn" disabled>Convert</button>

        </div>
    </div>

    <div class="hero">
        <h4>Coded by USKO IT Team, 2026</h4>
    </div>

</div>
<script>

    const input = document.getElementById("fileInput");
    const previewList = document.getElementById("previewList");
    const convertBtn = document.getElementById("convertBtn");

    let items = [];

    // ==========================
    // UPDATE BUTTON STATE
    // ==========================
    function updateButtonState() {
        const hasFiles = items.length > 0;
        convertBtn.disabled = !hasFiles;
    }

    // ==========================
    // FILE HANDLING
    // ==========================
    input.addEventListener("change", handleFiles);

    async function handleFiles(e) {
        const files = Array.from(e.target.files || []);

        items = [];
        previewList.innerHTML = "";

        for (let file of files) {
            const obj = { file, rotation: 0 };
            items.push(obj);

            const card = document.createElement("div");
            card.className = "preview-card";

            // DELETE BUTTON
            const del = document.createElement("button");
            del.className = "delete-btn";
            del.innerText = "✕";

            del.onclick = (ev) => {
                ev.preventDefault();
                items = items.filter(i => i !== obj);
                card.remove();
                updateButtonState();
            };

            // ROTATE BUTTON
            const rot = document.createElement("button");
            rot.className = "rotate-btn";
            rot.innerText = "⟳";

            let preview;

            rot.onclick = (ev) => {
                ev.preventDefault();
                obj.rotation = (obj.rotation + 90) % 360;
                preview.style.transform = `rotate(${obj.rotation}deg)`;
            };

            // PREVIEW
            if (file.type.startsWith("image/")) {
                preview = document.createElement("img");
                preview.src = URL.createObjectURL(file);
            } else {
                preview = document.createElement("canvas");

                const pdfData = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
                const page = await pdf.getPage(1);

                const viewport = page.getViewport({ scale: 0.4 });
                const ctx = preview.getContext("2d");

                preview.width = viewport.width;
                preview.height = viewport.height;

                await page.render({ canvasContext: ctx, viewport }).promise;
            }

            card.appendChild(del);
            card.appendChild(rot);
            card.appendChild(preview);

            previewList.appendChild(card);
        }

        new Sortable(previewList, {
            animation: 150,
            onEnd: () => {
                // reorder items based on DOM order
                const newOrder = [];
                const cards = previewList.children;

                for (let card of cards) {
                    const index = [...previewList.children].indexOf(card);
                    newOrder.push(items[index]);
                }

                items = newOrder;
            }
        });

        updateButtonState();
    }

    // ==========================
    // CONVERT PDF
    // ==========================
    convertBtn.onclick = async () => {
        if (items.length === 0) return;

        const formData = new FormData();

        items.forEach(item => {
            formData.append("files", item.file);
            formData.append("rotations", item.rotation);
        });

        // options
        document.querySelectorAll("input[type=checkbox]").forEach(cb => {
            formData.append(cb.name, cb.checked ? "on" : "off");
        });

        const res = await fetch("/convert", {
            method: "POST",
            body: formData
        });

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "output.pdf";
        a.click();

        URL.revokeObjectURL(url);
    };

    // ==========================
    // DRAG & DROP SUPPORT
    // ==========================
    const dropZone = document.querySelector(".upload-box");

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");

        input.files = e.dataTransfer.files;
        handleFiles({ target: input });
    });


    // init state
    updateButtonState();
</script>

</body>
</html>
